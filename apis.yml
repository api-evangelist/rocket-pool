apis:
  - aid: rocket-pool:smart-node-daemon-api
    name: Rocket Pool Smart Node Daemon API
    description: >-
      The Smart Node daemon API is the local HTTP/IPC interface exposed by the rocketpool-daemon Go service that ships
      with the Smart Node Docker stack. The rocketpool CLI uses this API to manage node operator wallets, minipools,
      megapools, RPL staking, rewards claims, smoothing pool participation, and protocol/oracle DAO interactions. It is
      local-only, authenticated by filesystem access, and is the contract between the CLI front-end and the long-running
      node service.
    humanURL: https://github.com/rocket-pool/smartnode
    tags:
      - Smart Node
      - Node Operator
      - CLI
      - Minipool
      - Megapool
      - Wallet
      - Rewards
      - DAO
    properties:
      - type: SourceCode
        url: https://github.com/rocket-pool/smartnode
      - type: Documentation
        url: https://docs.rocketpool.net/guides/node/responsibilities
      - type: OpenAPI
        url: openapi/rocket-pool-smart-node-openapi.yml
      - type: Spectral
        url: rules/rocket-pool-smart-node-rules.yml
  - aid: rocket-pool:rocketpool-go-protocol-api
    name: Rocket Pool Protocol API (rocketpool-go)
    description: >-
      The rocketpool-go library is a Golang client that wraps the Rocket Pool smart contracts deployed on Ethereum and
      exposes a typed protocol API for reading and writing network state: deposit pool, minipools, megapools, node
      registrations, RPL staking, rewards trees, auctions, oracle DAO, protocol DAO, tokens (rETH, RPL), and protocol
      settings. It is the canonical Go interface to the protocol and is used by the Smart Node, by Oracle DAO tooling,
      and by third-party integrators.
    humanURL: https://github.com/rocket-pool/rocketpool-go
    tags:
      - Smart Contracts
      - Go
      - Library
      - Protocol
      - rETH
      - RPL
      - Minipool
      - Auction
      - DAO
    properties:
      - type: SourceCode
        url: https://github.com/rocket-pool/rocketpool-go
      - type: Documentation
        url: https://docs.rocketpool.net/overview/contracts-integrations
      - type: OpenAPI
        url: openapi/rocket-pool-protocol-openapi.yml
  - aid: rocket-pool:rocketpool-js-protocol-api
    name: Rocket Pool Protocol API (rocketpool-js)
    description: >-
      The rocketpool-js library is a TypeScript/JavaScript client for the Rocket Pool protocol's deployed smart
      contracts. It mirrors much of the Go library's surface and is intended for browser-based dApps, indexer services,
      and integrations such as DeFi front-ends that need to read rETH state or submit user deposits.
    humanURL: https://github.com/rocket-pool/rocketpool-js
    tags:
      - Smart Contracts
      - TypeScript
      - JavaScript
      - Library
      - rETH
      - dApp
    properties:
      - type: SourceCode
        url: https://github.com/rocket-pool/rocketpool-js
      - type: SDKs
        url: https://www.npmjs.com/package/@rocket-pool/contracts
