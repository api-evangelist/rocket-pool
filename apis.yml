aid: rocket-pool
name: Rocket Pool
description: >-
  Rocket Pool is a decentralized Ethereum liquid staking protocol that lets anyone participate in Ethereum
  proof-of-stake without running a full 32 ETH validator. Stakers deposit ETH and receive rETH, a rebasing-free
  yield-bearing liquid staking token that automatically accrues consensus and execution layer rewards and is freely
  composable across DeFi. On the supply side, permissionless node operators can run a Rocket Pool minipool with as
  little as 8 ETH (and a smaller RPL bond) — Rocket Pool pairs operator ETH with the rETH-backed deposit pool to fund
  full beacon-chain validators, and operators earn consensus rewards plus a commission from rETH users and RPL inflation
  rewards. The protocol is governed on-chain through the Protocol DAO (pDAO) and the Oracle DAO (oDAO) and is specified
  by Rocket Pool Improvement Proposals (RPIPs). The reference node software stack is the Smart Node (rocketpool CLI plus
  a Go daemon) distributed as Docker images, alongside Go and TypeScript/JavaScript libraries (rocketpool-go,
  rocketpool-js) for reading and writing protocol state directly against the Rocket Pool smart contracts on Ethereum
  mainnet. Rocket Pool has no centralized REST API, no hosted developer platform, no API keys, and no pricing — all
  participation is on-chain via Ethereum JSON-RPC and the protocol's deployed contracts.
